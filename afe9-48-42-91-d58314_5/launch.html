<!DOCTYPE html>
<!-- last updated: 21/04/2026 -->
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="manifest" href="./manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Rally Gallery</title>
<style>

* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg:        #111;
  --brand-h:   38px;
  --toolbar-h: 36px;
  --accent:    #e8c840;
  --grey:      #1e1e1e;
  --grey-text: #444;
  --border:    #2a2a2a;
  --radius:    10px;
}

html, body {
  height: 100dvh;
  background: var(--bg);
  color: #fff;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  overflow: hidden;
}

/* ── Confirmation modal ──────────────────────────────────────────────────── */
#confirm-modal {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 300;
  background: rgba(0,0,0,0.85);
  align-items: center;
  justify-content: center;
  padding: 24px;
}

#confirm-modal.visible {
  display: flex;
}

#confirm-box {
  background: #1a1a1a;
  border: 1px solid #333;
  border-radius: 14px;
  padding: 24px 20px 20px;
  max-width: 340px;
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

#confirm-title {
  font-size: 13px;
  font-weight: 800;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--accent);
  text-align: center;
}

#confirm-text {
  font-size: 13px;
  line-height: 1.6;
  color: #ccc;
  text-align: center;
}

#confirm-buttons {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.confirm-btn {
  border-radius: 10px;
  border: none;
  padding: 13px;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 0.04em;
  -webkit-tap-highlight-color: transparent;
}

#btn-confirm {
  background: var(--accent);
  color: #000;
}

#btn-confirm:active { opacity: 0.85; }

#btn-cancel {
  background: #2a2a2a;
  color: #888;
  border: 1px solid #333;
}

#btn-cancel:active { background: #333; }

/* ── PIN screen ──────────────────────────────────────────────────────────── */
#pin-screen {
  position: fixed;
  inset: 0;
  background: #000;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 200;
  gap: 20px;
}

#pin-screen.hidden {
  display: none;
}

#pin-title {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--accent);
}

#pin-dots {
  display: flex;
  gap: 14px;
}

.pin-dot {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  border: 2px solid #444;
  background: transparent;
  transition: background 0.15s, border-color 0.15s;
}

.pin-dot.filled {
  background: var(--accent);
  border-color: var(--accent);
}

.pin-dot.error {
  background: #e74c3c;
  border-color: #e74c3c;
}

#pin-keypad {
  display: grid;
  grid-template-columns: repeat(3, 68px);
  grid-template-rows: repeat(4, 56px);
  gap: 10px;
}

.pin-key {
  border-radius: 10px;
  border: 1.5px solid #2a2a2a;
  background: #1a1a1a;
  color: #fff;
  font-size: 20px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  transition: background 0.1s;
}

.pin-key:active {
  background: #2a2a2a;
}

.pin-key.del {
  font-size: 14px;
  color: #888;
}

.pin-key.empty {
  border-color: transparent;
  background: transparent;
  pointer-events: none;
}

/* ── Branding strip ──────────────────────────────────────────────────────── */
#brand-strip {
  height: 38px;
  min-height: 38px;
  background: #000;
  border-bottom: 1px solid #1a1a1a;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 12px;
  flex-shrink: 0;
}

#brand-strip img {
  height: 26px;
  width: auto;
  display: block;
  opacity: 0.9;
}

/* ── Toolbar ─────────────────────────────────────────────────────────────── */
#toolbar {
  height: var(--toolbar-h);
  display: flex;
  align-items: center;
  padding: 0 18px;
  background: #000;
  border-bottom: 1px solid #222;
  flex-shrink: 0;
  position: relative;
}

/* ── Countdown bar ───────────────────────────────────────────────────────── */
#countdown-bar-wrap {
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 120px;
  height: 3px;
  background: rgba(255,255,255,0.1);
  border-radius: 0 0 2px 2px;
  overflow: hidden;
  pointer-events: none;
}

#countdown-bar {
  height: 100%;
  width: 100%;
  background: var(--accent);
  border-radius: 0 0 2px 2px;
  transform-origin: left center;
  animation: countdown 60s linear forwards;
}

@keyframes countdown {
  from { transform: scaleX(1); }
  to   { transform: scaleX(0); }
}

#rally-name {
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 0.06em;
  color: var(--accent);
}

/* ── Scrollable stage list ───────────────────────────────────────────────── */
#scroll {
  position: fixed;
  top: calc(var(--brand-h) + var(--toolbar-h));
  bottom: 0;
  left: 0;
  right: 0;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 10px 12px;
}

/* ── Stage divider ───────────────────────────────────────────────────────── */
.stage-divider {
  height: 3px;
  background: var(--accent);
  margin: 4px 0;
  border-radius: 2px;
}

/* ── Stage row ───────────────────────────────────────────────────────────── */
.stage-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
}

/* Stage label — fixed width so icons align */
.stage-label {
  width: 52px;
  flex-shrink: 0;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.stage-label-id {
  font-size: 13px;
  font-weight: 800;
  letter-spacing: 0.04em;
  color: var(--accent);
  white-space: nowrap;
}

.stage-label-desc {
  font-size: 9px;
  font-weight: 800;
  color: var(--accent);
  line-height: 1.2;
  text-align: center;
}

/* ── Icon cards ──────────────────────────────────────────────────────────── */
.icon-card {
  flex: 1;
  border-radius: var(--radius);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 10px 6px;
  gap: 5px;
  transition: transform 0.12s;
  min-height: 64px;
  position: relative;
}

/* Live — yellow, tappable */
.icon-card.live {
  background: #1a1800;
  border: 1.5px solid var(--accent);
  cursor: pointer;
}

.icon-card.live:active {
  transform: scale(0.94);
}

/* Empty — grey, non-tappable */
.icon-card.empty {
  background: var(--grey);
  border: 1.5px solid #2a2a2a;
  cursor: default;
  pointer-events: none;
}

/* Icon SVG */
.icon-card svg {
  width: 22px;
  height: 22px;
  flex-shrink: 0;
}

.icon-card.live  svg { stroke: var(--accent); }
.icon-card.empty svg { stroke: #444; }

/* Sub-label below icon */
.icon-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

.icon-card.live  .icon-label { color: rgba(232,200,64,0.7); }
.icon-card.empty .icon-label { color: #3a3a3a; }

/* ── Loading / error ─────────────────────────────────────────────────────── */
#status {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: #555;
  font-size: 14px;
  text-align: center;
  line-height: 1.6;
}

</style>
</head>
<body>

<div id="confirm-modal">
  <div id="confirm-box">
    <div id="confirm-title">StageHand</div>
    <div id="confirm-text">StageHand is for M-Sport World Rally Team use only. By continuing, you confirm you are a member of the Team and will not share this URL, PIN, images or data with others.</div>
    <div id="confirm-buttons">
      <button class="confirm-btn" id="btn-confirm">I confirm</button>
      <button class="confirm-btn" id="btn-cancel">I am not authorised</button>
    </div>
  </div>
</div>

<div id="pin-screen">
  <div id="pin-title">Enter PIN</div>
  <div id="pin-dots">
    <div class="pin-dot" id="dot-0"></div>
    <div class="pin-dot" id="dot-1"></div>
    <div class="pin-dot" id="dot-2"></div>
    <div class="pin-dot" id="dot-3"></div>
  </div>

    <div class="pin-key" data-v="1">1</div>
    <div class="pin-key" data-v="2">2</div>

    <div class="pin-key" data-v="5">5</div>

    <div class="pin-key" data-v="7">7</div>
    <div class="pin-key" data-v="8">8</div>
    <div class="pin-key" data-v="9">9</div>
    <div class="pin-key empty"></div>

</div>

<div id="brand-strip">
  <img src="../msport_logo.png" alt="M-Sport">

</div>

<div id="toolbar">
  <div id="countdown-bar-wrap">
    <div id="countdown-bar"></div>
  </div>

</div>

<div id="scroll">
  <div id="stage-list"></div>
</div>

<div id="status">Loading stages...</div>

<script>

// ── PIN authentication ────────────────────────────────────────────────────
const _PIN_HASH     = "d79f130c7c09e775fbc1018197fc1fa73418487f5d0d4aee5c53fb2d9d860383";
const _STORAGE_KEY  = "rally_auth_afe9-48-42-91-d58314_5";

async function _sha256(str) {
  const buf  = await crypto.subtle.digest(
    "SHA-256", new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf))
    .map(b => b.toString(16).padStart(2, '0')).join('');
}

(function() {
  // Already authenticated on this device for this rally?
  if (localStorage.getItem(_STORAGE_KEY) === '1') {
    document.getElementById('pin-screen').classList.add('hidden');
    return;
  }

  let _entered = [];

  function _updateDots(error) {
    for (let i = 0; i < 4; i++) {
      const dot = document.getElementById('dot-' + i);
      dot.classList.remove('filled', 'error');
      if (error) {
        dot.classList.add('error');
      } else if (i < _entered.length) {
        dot.classList.add('filled');
      }
    }
  }

  async function _check() {
    const hash = await _sha256(_entered.join(''));
    if (hash === _PIN_HASH) {
      // Show confirmation modal before granting access
      document.getElementById('confirm-modal').classList.add('visible');
    } else {
      _updateDots(true);
      setTimeout(() => { _entered = []; _updateDots(false); }, 700);
    }
  }

  document.querySelectorAll('.pin-key').forEach(key => {
    key.addEventListener('click', () => {
      const v = key.dataset.v;
      if (v === 'del') {
        if (_entered.length > 0) { _entered.pop(); _updateDots(false); }
      } else if (_entered.length < 4) {
        _entered.push(v);
        _updateDots(false);
        if (_entered.length === 4) _check();
      }
    });
  });
  // Confirmation modal buttons
  document.getElementById('btn-confirm').addEventListener('click', () => {
    localStorage.setItem(_STORAGE_KEY, '1');
    document.getElementById('confirm-modal').classList.remove('visible');
    document.getElementById('pin-screen').classList.add('hidden');
  });

  document.getElementById('btn-cancel').addEventListener('click', () => {
    // Not authorised — clear stored auth and return to PIN screen
    localStorage.removeItem(_STORAGE_KEY);
    document.getElementById('confirm-modal').classList.remove('visible');
    _entered = [];
    _updateDots(false);
  });

})();

// Placeholders replaced by create_rally.py at upload time

// ── GitHub token — read from URL hash or localStorage ─────────────────────
// Share URL as: launch.html#t=YOUR_TOKEN
// Token is stored in localStorage so it only needs to be in the URL once.
(function() {
  const hash = window.location.hash;
  const match = hash.match(/[#&]t=([^&]+)/);
  if (match) {
    localStorage.setItem('gh_token', match[1]);
    // Clean the token from the URL without reloading
    history.replaceState(null, '', window.location.pathname + window.location.search);
  }
})();

function _ghToken() {
  return localStorage.getItem('gh_token') || '';
}

function _ghHeaders() {
  const t = _ghToken();
  const h = { 'Accept': 'application/vnd.github.v3+json' };
  if (t) h['Authorization'] = 'token ' + t;
  return h;
}
const GITHUB_USERNAME = "msrt-wrc-met-rep-pho";
const GITHUB_REPO     = "a7f3e291-4b8d-4c2a-9e16-d05f8b3c1a47";
const RALLY_FOLDER    = "afe9-48-42-91-d58314_5";

// ── SVG icons ─────────────────────────────────────────────────────────────
function _photoIcon() {
  const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
  svg.setAttribute("viewBox", "0 0 24 24");
  svg.setAttribute("fill", "none");
  svg.setAttribute("stroke-width", "2");
  svg.setAttribute("stroke-linecap", "round");
  svg.setAttribute("stroke-linejoin", "round");
  svg.innerHTML = `
    <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8
             a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
    <circle cx="12" cy="13" r="4"/>`;
  return svg;
}

function _weatherIcon() {
  const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
  svg.setAttribute("viewBox", "0 0 24 24");
  svg.setAttribute("fill", "none");
  svg.setAttribute("stroke-width", "2");
  svg.setAttribute("stroke-linecap", "round");
  svg.setAttribute("stroke-linejoin", "round");
  svg.innerHTML = `
    <path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9z"/>`;
  return svg;
}

function _rncIcon(live) {
  const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
  svg.setAttribute("viewBox", "0 0 139 60");
  svg.style.width = "42px";
  svg.style.height = "18px";
  const col = live ? "#e8c840" : "#444";
  const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
  g.setAttribute("transform", "translate(0,60) scale(0.1,-0.1)");
  g.setAttribute("fill", col);
  g.setAttribute("stroke", "none");
  g.innerHTML = `
    <path d="M518 560 c-71 -11 -162 -48 -230 -93 -29 -20 -73 -40 -97 -46 -25 -5 -56 -18 -70 -29 -35 -26 -60 -95 -60 -169 -1 -74 21 -106 67 -101 36 4 33 22 -4 28 -27 5 -29 8 -32 60 -7 114 21 162 105 183 28 8 81 33 117 56 85 56 169 81 287 88 160 9 293 -30 393 -116 53 -46 51 -45 176 -66 128 -22 142 -35 138 -130 l-3 -70 -32 -3 c-46 -5 -45 -32 1 -32 50 0 66 28 66 113 0 65 -2 71 -33 102 -25 25 -45 35 -83 40 -103 14 -154 27 -183 48 -16 12 -50 36 -74 54 -96 70 -297 107 -449 83z"/>
    <path d="M640 517 c0 -24 45 -119 60 -127 10 -6 78 -9 152 -8 l133 2 -135 5c-74 4 -140 9 -147 14 -6 4 -19 29 -29 55 -16 43 -34 75 -34 59z"/>
    <path d="M412 443 c26 -60 32 -63 142 -61 l101 2 -95 3 c-101 4 -123 14 -134 59 -4 13 -11 24 -16 24 -6 0 -5 -11 2 -27z"/>
    <path d="M243 274 c-50 -25 -67 -61 -64 -132 1 -13 16 -39 35 -58 29 -29 41 -34 81 -34 40 0 52 5 81 34 29 29 34 41 34 80 0 88 -92 148 -167 110z m109 -43 c42 -38 44 -89 5 -128 -67 -68 -177 2 -146 94 11 35 48 62 86 63 13 0 37 -13 55 -29z"/>
    <path d="M1055 276 c-61 -27 -88 -100 -60 -160 21 -44 59 -66 116 -66 33 0 47 6 75 34 29 29 34 41 34 80 0 86 -89 146 -165 112z m112 -48 c48 -45 23 -132 -44 -152 -32 -10 -89 20 -103 54 -39 93 73 168 147 98z"/>
    <path d="M437 143 c-21 -20 16 -23 261 -21 169 2 267 7 267 13 0 11 -517 20 -528 8z"/>`;
  svg.appendChild(g);
  return svg;
}

// ── Build one stage row ────────────────────────────────────────────────────
function buildRow(key, info, list) {
  const hasPhotos  = info.count  > 0;
  const hasWeather = info.weather_count > 0;
  const isAnyLive  = hasPhotos || hasWeather;

  if (info.divider_above === true) {
    const divider = document.createElement('div');
    divider.className = 'stage-divider';
    list.appendChild(divider);
  }

  const row = document.createElement('div');
  row.className = 'stage-row';

  // Stage label — ID on top, description below
  const label = document.createElement('div');
  label.className = 'stage-label' + (isAnyLive ? ' live' : '');
  const idSpan = document.createElement('div');
  idSpan.className = 'stage-label-id';
  idSpan.textContent = key;
  label.appendChild(idSpan);
  const descSpan = document.createElement('div');
  descSpan.className = 'stage-label-desc';
  descSpan.textContent = info.label || '';
  label.appendChild(descSpan);
  row.appendChild(label);

  // ── Photo icon card ──────────────────────────────────────────────────────
  const photoCard = document.createElement('div');
  photoCard.className = 'icon-card ' + (hasPhotos ? 'live' : 'empty');
  photoCard.appendChild(_photoIcon());

  const photoLabel = document.createElement('div');
  photoLabel.className = 'icon-label';
  photoLabel.textContent = hasPhotos ? `${info.count}` : '0';
  photoCard.appendChild(photoLabel);

  if (hasPhotos) {
    photoCard.addEventListener('click', () => {
      window.location.href = `${key}/photos.html`;
    });
  }
  row.appendChild(photoCard);

  // ── Weather icon card ────────────────────────────────────────────────────
  const wxCard = document.createElement('div');
  wxCard.className = 'icon-card ' + (hasWeather ? 'live' : 'empty');
  wxCard.appendChild(_weatherIcon());

  const wxLabel = document.createElement('div');
  wxLabel.className = 'icon-label';
  wxLabel.textContent = hasWeather ? `${info.weather_count}` : '0';
  wxCard.appendChild(wxLabel);

  if (hasWeather) {
    wxCard.addEventListener('click', () => {
      window.location.href = `${key}/weather.html`;
    });
  }
  row.appendChild(wxCard);

  // ── RNC icon card ─────────────────────────────────────────────────────────
  const rncCount     = info.rnc_count || 0;
  const hasRnc       = rncCount > 0;
  const showRncIcon  = info.has_rnc_icon === true;

  const rncCard = document.createElement('div');
  if (showRncIcon) {
    rncCard.className = 'icon-card ' + (hasRnc ? 'live' : 'empty');
    rncCard.appendChild(_rncIcon(hasRnc));

    const rncLabel = document.createElement('div');
    rncLabel.className = 'icon-label';
    rncLabel.textContent = `${rncCount}`;
    rncCard.appendChild(rncLabel);

    if (hasRnc) {
      rncCard.addEventListener('click', () => {
        window.location.href = `${key}/rnc.html`;
      });
    }
  } else {
    // No RNC for this stage — empty placeholder to keep layout consistent
    rncCard.className = 'icon-card empty';
    rncCard.style.visibility = 'hidden';
  }
  row.appendChild(rncCard);

  return row;
}

// ── Load stages.json via GitHub API ───────────────────────────────────────
const apiUrl = `https://api.github.com/repos/${GITHUB_USERNAME}/${GITHUB_REPO}/contents/${RALLY_FOLDER}/stages.json`;

fetch(apiUrl, { headers: _ghHeaders() })
  .then(r => {
    const remaining = r.headers.get('X-RateLimit-Remaining');
    if (r.status === 403 && remaining === '0') {
      const reset = r.headers.get('X-RateLimit-Reset');
      const resetTime = reset
        ? new Date(parseInt(reset) * 1000).toLocaleTimeString()
        : 'shortly';
      throw new Error(`GitHub API rate limit reached. Resets at ${resetTime}.`);
    }
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    return r.json();
  })
  .then(apiData => JSON.parse(atob(apiData.content.replace(/\n/g, ''))))
  .then(data => {
    document.getElementById('status').style.display = 'none';
    renderStages(data);
    resetCountdownBar();
  })
  .catch(err => {
    document.getElementById('status').textContent =
      `Could not load stage data.\n${err.message}`;
    resetCountdownBar();
  });

// ── Countdown bar ─────────────────────────────────────────────────────────
function resetCountdownBar() {
  const bar = document.getElementById('countdown-bar');
  bar.style.animation = 'none';
  bar.offsetHeight;
  bar.style.animation = '';
}

// ── Render stage list from data ───────────────────────────────────────────
function renderStages(data) {
  document.getElementById('rally-name').textContent = data.rally;
  document.title = data.rally;

  const list = document.getElementById('stage-list');
  list.innerHTML = '';

  const stageKeys = Object.keys(data.stages);

  stageKeys.forEach(key => {
    list.appendChild(buildRow(key, data.stages[key], list));
  });
}

// ── Periodic refresh ──────────────────────────────────────────────────────
async function checkForUpdates() {
  if (document.hidden) { resetCountdownBar(); return; }

  try {
    const r = await fetch(apiUrl, {
      headers: _ghHeaders(),
      cache: 'no-store'
    });

    if (r.status === 403) {
      const remaining = r.headers.get('X-RateLimit-Remaining');
      if (remaining === '0') {
        resetCountdownBar();
        return;
      }
    }

    if (!r.ok) { resetCountdownBar(); return; }

    const apiData = await r.json();
    const data    = JSON.parse(atob(apiData.content.replace(/\n/g, '')));
    renderStages(data);

  } catch (e) {
    // Silent fail
  }

  resetCountdownBar();
}

resetCountdownBar();
setInterval(checkForUpdates, 60000);

document.addEventListener('visibilitychange', () => {
  if (!document.hidden) checkForUpdates();
});

</script>
