<!DOCTYPE html>
<!-- last updated: 24/04/2026 -->
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="manifest" href="../manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Weather Forecasts</title>
<style>

* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg:        #111;
  --card-bg:   #1a1a1a;
  --accent:    #e8c840;
  --subtext:   #888;
  --border:    #2a2a2a;
  --radius:    10px;
  --toolbar-h: 36px;
  --brand-h:   38px;
}

html {
  height: 100dvh;
  overflow: hidden;
}

body {
  height: 100dvh;
  background: var(--bg);
  color: #fff;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ── Branding strip ──────────────────────────────────────────────────────── */
#brand-strip {
  height: var(--brand-h);
  min-height: var(--brand-h);
  background: #000;
  border-bottom: 1px solid #1a1a1a;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 12px;
  flex-shrink: 0;
}
#brand-strip img { height: 26px; width: auto; display: block; opacity: 0.9; }

/* ── Toolbar ─────────────────────────────────────────────────────────────── */
#toolbar {
  height: var(--toolbar-h);
  min-height: var(--toolbar-h);
  display: flex;
  align-items: center;
  padding: 0 6px 0 2px;
  background: #000;
  border-bottom: 1px solid #222;
  gap: 6px;
  flex-shrink: 0;
  position: relative;
}

#btn-launch {
  width: 28px; height: 28px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%;
  border: none; background: transparent;
  color: #fff; cursor: pointer; flex-shrink: 0;
}
#btn-launch:active { background: rgba(255,255,255,0.12); }
#btn-launch svg {
  width: 22px; height: 22px;
  fill: none; stroke: currentColor;
  stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round;
}

#toolbar-title {
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 0.06em;
  color: var(--accent);
  flex: 1;
}

#toolbar-count {
  font-size: 12px;
  color: var(--subtext);
  padding-right: 8px;
}

/* ── Countdown bar ───────────────────────────────────────────────────────── */
#countdown-bar-wrap {
  position: absolute;
  top: 0; left: 50%;
  transform: translateX(-50%);
  width: 120px; height: 3px;
  background: rgba(255,255,255,0.1);
  border-radius: 0 0 2px 2px;
  overflow: hidden; pointer-events: none;
}
#countdown-bar {
  height: 100%; width: 100%;
  background: var(--accent);
  border-radius: 0 0 2px 2px;
  transform-origin: left center;
  animation: countdown 30s linear forwards;
}
@keyframes countdown {
  from { transform: scaleX(1); }
  to   { transform: scaleX(0); }
}

/* ── Scroll ──────────────────────────────────────────────────────────────── */
#scroll {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 12px;
  min-height: 0;
}

/* ── Forecast card ───────────────────────────────────────────────────────── */
.forecast-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  padding: 14px 16px;
  gap: 14px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.15s;
  text-decoration: none;
}
.forecast-card:active { background: #222; }

.forecast-icon {
  flex-shrink: 0;
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
}
.forecast-icon svg {
  width: 28px; height: 28px;
  fill: none; stroke: var(--accent);
  stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round;
}

.forecast-info { flex: 1; min-width: 0; }

.forecast-name {
  font-size: 13px;
  font-weight: 700;
  color: #fff;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.forecast-meta {
  font-size: 11px;
  color: var(--subtext);
  margin-top: 3px;
}

.forecast-arrow {
  flex-shrink: 0;
  color: var(--subtext);
}
.forecast-arrow svg {
  width: 18px; height: 18px;
  fill: none; stroke: currentColor;
  stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
}

/* ── Empty state ─────────────────────────────────────────────────────────── */
#empty {
  display: none;
  text-align: center;
  color: var(--subtext);
  font-size: 14px;
  margin-top: 40px;
}

/* ── Toast ───────────────────────────────────────────────────────────────── */
#toast {
  position: fixed;
  bottom: 40px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: rgba(232,200,64,0.95);
  color: #000; font-size: 13px; font-weight: 700;
  padding: 8px 18px; border-radius: 20px;
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s, transform 0.3s;
  white-space: nowrap; z-index: 50;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }


/* ── Cached version banner ───────────────────────────────────────────────── */
#cached-banner {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 500;
  background: #b35c00;
  color: #fff;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-align: center;
  padding: 6px 12px;
  text-transform: uppercase;
}
#cached-banner.visible { display: block; }
</style>
</head>
<body>

<div id="cached-banner">⚠ Showing cached version — data may not be current</div>

<div id="brand-strip">
  <img src="../../msport_logo.png" alt="M-Sport">
  <img src="../../stagehand_logo.png" alt="StageHand">
</div>

<div id="toolbar">
  <div id="countdown-bar-wrap"><div id="countdown-bar"></div></div>
  <button id="btn-launch" aria-label="Back to rally">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <div id="toolbar-title">Weather Forecasts</div>
  <div id="toolbar-count"></div>
</div>

<div id="scroll">
  <div id="cards"></div>
  <div id="empty">No forecasts uploaded yet.</div>
</div>

<div id="toast"></div>

<script>

// ── GitHub token ──────────────────────────────────────────────────────────
(function() {
  const hash = window.location.hash;
  const match = hash.match(/[#&]t=([^&]+)/);
  if (match) {
    localStorage.setItem('gh_token', match[1]);
    history.replaceState(null, '', window.location.pathname + window.location.search);
  }
})();
function _ghToken() { return localStorage.getItem('gh_token') || ''; }
function _ghHeaders() {
  const t = _ghToken();
  const h = { 'Accept': 'application/vnd.github.v3+json' };
  if (t) h['Authorization'] = 'token ' + t;
  return h;
}

const GITHUB_USERNAME = "msrt-wrc-met-rep-pho";
const GITHUB_REPO     = "a7f3e291-4b8d-4c2a-9e16-d05f8b3c1a47";
const RALLY_FOLDER    = "afe9-48-42-91-d58314_D";
// ── Stats logging ──────────────────────────────────────────────────────────
(function() {
  function _deviceId() {
    let id = localStorage.getItem('sh_device_id');
    if (!id) {
      id = 'dev_' + Math.random().toString(36).slice(2,10) +
           Math.random().toString(36).slice(2,10);
      localStorage.setItem('sh_device_id', id);
    }
    return id;
  }
  window._logEvent = function(eventType, extra) {
    const endpoint = 'https://script.google.com/macros/s/AKfycbxOdSGTatWXmHs08MM87G-_unEzaOiOAjTcuxewKW3LMbIxITZiJ9lWCmYmy3UEYnxw/exec';
    const token    = 'sh-x7k2-rally-statsh-x7k2-rally-stat';
    if (!endpoint) return;
    try {
      const entry = Object.assign({
        action: 'log', token, t: new Date().toISOString(),
        ev: eventType, d: _deviceId(),
        rally: RALLY_FOLDER, rally_name: 'Rally Portugal 2026 - v3',
      }, extra || {});
      const formBody = Object.entries(entry).map(([k,v]) => encodeURIComponent(k)+'='+encodeURIComponent(v)).join('&');
      fetch(endpoint, { method: 'POST', body: formBody,
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
      }).catch(()=>{});
    } catch(e) {}
  };
})();


// Forecast data injected at upload time — array of {filename, uploaded_at, size_kb}
const FORECASTS_DATA = [
  {
    "filename": "Rally Canaries 2026 Weather Forecast V1.pdf",
    "uploaded_at": "02:09:45",
    "size_kb": 233.4
  },
  {
    "filename": "Rally Canaries 2026 Weather Forecast V2.pdf",
    "uploaded_at": "02:09:45",
    "size_kb": 235.9
  }
];

// Base URL for PDF files
function pdfUrl(filename) {
  return `https://${GITHUB_USERNAME}.github.io/${GITHUB_REPO}/${RALLY_FOLDER}/forecasts/${filename}`;
}

// ── PDF icon SVG ──────────────────────────────────────────────────────────
function _pdfIcon() {
  return `<svg viewBox="0 0 24 24">
    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
    <polyline points="14 2 14 8 20 8"/>
    <line x1="9" y1="13" x2="15" y2="13"/>
    <line x1="9" y1="17" x2="12" y2="17"/>
  </svg>`;
}

// ── Build cards ───────────────────────────────────────────────────────────
const cardsEl = document.getElementById('cards');
let knownCount = 0;

function renderAll(data) {
  cardsEl.innerHTML = '';
  if (!data || data.length === 0) {
    document.getElementById('empty').style.display = 'block';
    document.getElementById('toolbar-count').textContent = '';
    knownCount = 0;
    return;
  }
  document.getElementById('empty').style.display = 'none';
  document.getElementById('toolbar-count').textContent =
    `${data.length} file${data.length > 1 ? 's' : ''}`;

  _markSeen(data.length);
  data.forEach(f => {
    const a = document.createElement('a');
    a.className = 'forecast-card';
    a.href = pdfUrl(f.filename);
    a.target = '_blank';
    a.rel = 'noopener';
    a.addEventListener('click', () => { if (window._logEvent) _logEvent('forecast_view', {file: f.filename}); });

    a.innerHTML = `
      <div class="forecast-icon">${_pdfIcon()}</div>
      <div class="forecast-info">
        <div class="forecast-name">${f.filename}</div>
        <div class="forecast-meta">${f.size_kb} KB · Uploaded ${f.uploaded_at}</div>
      </div>
      <div class="forecast-arrow">
        <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
      </div>`;

    cardsEl.appendChild(a);
  });
  knownCount = data.length;
}


// ── Mark as seen in localStorage ──────────────────────────────────────────
function _markSeen(count) {
  localStorage.setItem(`seen_${RALLY_FOLDER}_forecasts`, count);
}

renderAll(FORECASTS_DATA);
if (window._logEvent) _logEvent('forecasts_open');

// ── Back to launch ────────────────────────────────────────────────────────
document.getElementById('btn-launch').addEventListener('click', () => {
  window.location.href = '../launch.html';
});

// ── Toast ─────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ── Countdown bar ─────────────────────────────────────────────────────────
function resetCountdownBar() {
  const bar = document.getElementById('countdown-bar');
  bar.style.animation = 'none';
  bar.offsetHeight;
  bar.style.animation = '';
}

// ── Live refresh ──────────────────────────────────────────────────────────
const _apiBase = `https://api.github.com/repos/${GITHUB_USERNAME}/${GITHUB_REPO}/contents/${RALLY_FOLDER}/forecasts/forecasts.json`;

async function checkForUpdates() {
  if (document.hidden) { resetCountdownBar(); return; }
  try {
    const r = await fetch(_apiBase, { headers: _ghHeaders() });
    if (!r.ok) { resetCountdownBar(); return; }
    const apiData = await r.json();
    const data = JSON.parse(atob(apiData.content.replace(/\n/g, '')));
    if (data.length > knownCount) {
      const added = data.length - knownCount;
      renderAll(data);
      showToast(`+${added} new forecast${added > 1 ? 's' : ''}`);
    }
  } catch (e) {}
  resetCountdownBar();
}

resetCountdownBar();
setInterval(checkForUpdates, 30000);
document.addEventListener('visibilitychange', () => {
  if (!document.hidden) checkForUpdates();
});



// ── Cached version detection ──────────────────────────────────────────────
(async function() {
  if (!('serviceWorker' in navigator)) return;
  try {
    // Fetch the current page URL — if SW serves it from cache, 
    // the custom header X-From-SW-Cache will be present
    const resp = await fetch(window.location.href, { method: 'GET', cache: 'no-store' });
    if (resp.headers.get('X-From-SW-Cache') === '1') {
      const banner = document.getElementById('cached-banner');
      if (banner) banner.classList.add('visible');
    }
  } catch (e) {}
})();
// ── Service Worker registration ───────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('../../sw.js', { scope: './' })
    .catch(() => {});
}
</script>
</body>
</html>
