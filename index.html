<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Rally Gallery</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    height: 100dvh;
    overflow: hidden;
    touch-action: none;
    user-select: none;
  }

  #gallery {
    width: 100%;
    height: 100dvh;
    position: relative;
    overflow: hidden;
  }

  .slide {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.25s ease, transform 0.25s ease;
    transform: translateX(100%);
  }

  .slide.active {
    opacity: 1;
    transform: translateX(0);
  }

  .slide.prev {
    opacity: 0;
    transform: translateX(-100%);
  }

  .slide img {
    max-width: 100%;
    max-height: 100dvh;
    object-fit: contain;
    display: block;
    pointer-events: none;
    -webkit-user-drag: none;
  }

  /* dragging state — disable transition for live tracking */
  #gallery.dragging .slide {
    transition: none;
  }

  /* Counter pill */
  #counter {
    position: fixed;
    top: 16px;
    right: 16px;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    color: #fff;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.04em;
    padding: 5px 11px;
    border-radius: 20px;
    pointer-events: none;
    z-index: 10;
    border: 1px solid rgba(255,255,255,0.15);
  }



  /* Dot strip at bottom */
  #dots {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 5px;
    align-items: center;
    z-index: 10;
    max-width: 90vw;
    flex-wrap: nowrap;
    overflow: hidden;
  }

  /* Only shown when ≤ 20 images */
  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(255,255,255,0.35);
    flex-shrink: 0;
    transition: background 0.2s, transform 0.2s;
  }

  .dot.active {
    background: #fff;
    transform: scale(1.35);
  }

  /* Loading state */
  .slide .loader {
    width: 32px;
    height: 32px;
    border: 3px solid rgba(255,255,255,0.15);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    position: absolute;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="counter">1 / N</div>
<div id="dots"></div>
<div id="gallery"></div>

<script>
// ── Image list injected by Python ──────────────────────────────────────────
const IMAGES = [
    "SS18_501.jpg",
    "SS18_502.jpg",
    "SS18_503.jpg"
];
// ──────────────────────────────────────────────────────────────────────────

const gallery  = document.getElementById('gallery');
const counter  = document.getElementById('counter');
const dotsEl   = document.getElementById('dots');

let current = 0;
const total = IMAGES.length;

// Build slides
const slides = IMAGES.map((src, i) => {
  const div = document.createElement('div');
  div.className = 'slide' + (i === 0 ? ' active' : '');

  const loader = document.createElement('div');
  loader.className = 'loader';
  div.appendChild(loader);

  const img = document.createElement('img');
  img.src = src;
  img.onload = () => loader.remove();
  img.onerror = () => { loader.remove(); };
  div.appendChild(img);

  gallery.appendChild(div);
  return div;
});

// Build dots (only if ≤ 20 images, otherwise just counter)
if (total <= 20) {
  IMAGES.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i === 0 ? ' active' : '');
    dotsEl.appendChild(d);
  });
}

function updateUI() {
  counter.textContent = `${current + 1} / ${total}`;
  dotsEl.querySelectorAll('.dot').forEach((d, i) =>
    d.classList.toggle('active', i === current)
  );
}

function goTo(index, direction) {
  if (index < 0 || index >= total || index === current) return;

  const outgoing = slides[current];
  const incoming = slides[index];

  // position incoming off-screen in the right direction
  incoming.style.transform = direction > 0 ? 'translateX(100%)' : 'translateX(-100%)';
  incoming.classList.remove('prev');

  // force reflow so transition fires
  incoming.offsetHeight;

  outgoing.classList.remove('active');
  outgoing.classList.add('prev');
  incoming.classList.add('active');
  incoming.style.transform = '';

  // clean up outgoing after transition
  setTimeout(() => {
    outgoing.classList.remove('prev');
    outgoing.style.transform = '';
  }, 280);

  current = index;
  updateUI();
}

// ── Touch / swipe handling ─────────────────────────────────────────────────
let touchStartX = 0;
let touchStartY = 0;
let dragX = 0;
let isDragging = false;
const SWIPE_THRESHOLD = 50;
const DRAG_LOCK_ANGLE = 30; // degrees — below this, treat as horizontal swipe

gallery.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
  isDragging = false;
  dragX = 0;
}, { passive: true });

gallery.addEventListener('touchmove', e => {
  const dx = e.touches[0].clientX - touchStartX;
  const dy = e.touches[0].clientY - touchStartY;
  const angle = Math.abs(Math.atan2(dy, dx) * 180 / Math.PI);

  // Only hijack horizontal-ish swipes
  if (!isDragging && Math.abs(dx) < 8) return;

  if (angle < DRAG_LOCK_ANGLE || angle > (180 - DRAG_LOCK_ANGLE)) {
    isDragging = true;
    e.preventDefault();
    dragX = dx;
    gallery.classList.add('dragging');

    // live drag: shift active slide
    slides[current].style.transform = `translateX(${dragX}px)`;

    // peek next/prev
    if (dragX < 0 && current < total - 1) {
      slides[current + 1].style.transform = `translateX(calc(100% + ${dragX}px))`;
      slides[current + 1].classList.add('active');
    } else if (dragX > 0 && current > 0) {
      slides[current - 1].style.transform = `translateX(calc(-100% + ${dragX}px))`;
      slides[current - 1].classList.add('active');
    }
  }
}, { passive: false });

gallery.addEventListener('touchend', () => {
  gallery.classList.remove('dragging');

  // reset peeked slides
  slides.forEach((s, i) => {
    if (i !== current) {
      s.style.transform = '';
      s.classList.remove('active');
    }
  });
  slides[current].style.transform = '';

  if (isDragging) {
    if (dragX < -SWIPE_THRESHOLD) {
      goTo(current + 1, 1);
    } else if (dragX > SWIPE_THRESHOLD) {
      goTo(current - 1, -1);
    }
  }

  isDragging = false;
  dragX = 0;
});

// ── Keyboard navigation (desktop) ─────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') goTo(current + 1,  1);
  if (e.key === 'ArrowLeft')  goTo(current - 1, -1);
});

updateUI();
</script>
</body>
</html>
