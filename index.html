<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Rally Gallery</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    height: 100dvh;
    overflow: hidden;
    touch-action: pan-x pan-y;
    user-select: none;
  }

  #gallery {
    width: 100%;
    height: 100dvh;
    position: relative;
    overflow: hidden;
  }

  .slide {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.25s ease, transform 0.25s ease;
    transform: translateX(100%);
  }

  .slide.active {
    opacity: 1;
    transform: translateX(0);
  }

  .slide.prev {
    opacity: 0;
    transform: translateX(-100%);
  }

  .slide img {
    max-width: 100%;
    max-height: 100dvh;
    object-fit: contain;
    display: block;
    pointer-events: none;
    -webkit-user-drag: none;
    transform-origin: center center;
  }

  /* dragging state — disable transition for live tracking */
  #gallery.dragging .slide {
    transition: none;
  }

  /* Counter pill */
  #counter {
    position: fixed;
    top: 16px;
    right: 16px;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    color: #fff;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.04em;
    padding: 5px 11px;
    border-radius: 20px;
    pointer-events: none;
    z-index: 10;
    border: 1px solid rgba(255,255,255,0.15);
    transition: opacity 0.3s;
  }

  #counter.hidden { opacity: 0; }

  /* Dot strip at bottom */
  #dots {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 5px;
    align-items: center;
    z-index: 10;
    max-width: 90vw;
    flex-wrap: nowrap;
    overflow: hidden;
    transition: opacity 0.3s;
  }

  #dots.hidden { opacity: 0; }

  /* Only shown when ≤ 20 images */
  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(255,255,255,0.35);
    flex-shrink: 0;
    transition: background 0.2s, transform 0.2s;
  }

  .dot.active {
    background: #fff;
    transform: scale(1.35);
  }

  /* Loading state */
  .slide .loader {
    width: 32px;
    height: 32px;
    border: 3px solid rgba(255,255,255,0.15);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    position: absolute;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="counter">1 / N</div>
<div id="dots"></div>
<div id="gallery"></div>

<script>
// ── Image list injected by Python ──────────────────────────────────────────
const IMAGES = IMAGE_LIST_PLACEHOLDER;
// ──────────────────────────────────────────────────────────────────────────

const gallery = document.getElementById('gallery');
const counter = document.getElementById('counter');
const dotsEl  = document.getElementById('dots');

let current = 0;
const total = IMAGES.length;

// ── Zoom state ─────────────────────────────────────────────────────────────
const MIN_SCALE = 1.0;
const MAX_SCALE = 4.0;
let scale = 1.0;  // current zoom level of active image
let panX  = 0;    // pan offset X
let panY  = 0;    // pan offset Y

function isZoomed() { return scale > 1.02; }

function applyImageTransform(img) {
  img.style.transform = `scale(${scale}) translate(${panX / scale}px, ${panY / scale}px)`;
}

function resetZoom() {
  scale = 1.0;
  panX  = 0;
  panY  = 0;
  const img = slides[current].querySelector('img');
  if (img) applyImageTransform(img);
  counter.classList.remove('hidden');
  dotsEl.classList.remove('hidden');
}

function clampPan(s) {
  const img = slides[current].querySelector('img');
  if (!img) return;
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const iw = img.naturalWidth  || vw;
  const ih = img.naturalHeight || vh;

  // rendered size of image fitted into viewport at scale=1
  const ratio = Math.min(vw / iw, vh / ih);
  const fitW  = iw * ratio;
  const fitH  = ih * ratio;

  const maxPanX = Math.max(0, (fitW * s - vw) / 2);
  const maxPanY = Math.max(0, (fitH * s - vh) / 2);

  panX = Math.max(-maxPanX, Math.min(maxPanX, panX));
  panY = Math.max(-maxPanY, Math.min(maxPanY, panY));
}

// ── Build slides ───────────────────────────────────────────────────────────
const slides = IMAGES.map((src, i) => {
  const div = document.createElement('div');
  div.className = 'slide' + (i === 0 ? ' active' : '');

  const loader = document.createElement('div');
  loader.className = 'loader';
  div.appendChild(loader);

  const img = document.createElement('img');
  img.src = src;
  img.onload  = () => loader.remove();
  img.onerror = () => loader.remove();
  div.appendChild(img);

  gallery.appendChild(div);
  return div;
});

// Build dots (only if ≤ 20 images)
if (total <= 20) {
  IMAGES.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i === 0 ? ' active' : '');
    dotsEl.appendChild(d);
  });
}

function updateUI() {
  counter.textContent = `${current + 1} / ${total}`;
  dotsEl.querySelectorAll('.dot').forEach((d, i) =>
    d.classList.toggle('active', i === current)
  );
}

function goTo(index, direction) {
  if (index === current) return;

  resetZoom();

  const outgoing = slides[current];
  const incoming = slides[index];

  incoming.style.transform = direction > 0 ? 'translateX(100%)' : 'translateX(-100%)';
  incoming.classList.remove('prev');
  incoming.offsetHeight; // force reflow

  outgoing.classList.remove('active');
  outgoing.classList.add('prev');
  incoming.classList.add('active');
  incoming.style.transform = '';

  setTimeout(() => {
    outgoing.classList.remove('prev');
    outgoing.style.transform = '';
    const img = outgoing.querySelector('img');
    if (img) img.style.transform = '';
  }, 280);

  current = index;
  updateUI();
}

// ── Touch handling ─────────────────────────────────────────────────────────
let touchStartX   = 0;
let touchStartY   = 0;
let dragX         = 0;
let isDragging    = false;
let isPinching    = false;

let pinchStartDist  = 0;
let pinchStartScale = 1;

let panStartX  = 0;
let panStartY  = 0;
let panStartPX = 0;
let panStartPY = 0;

const SWIPE_THRESHOLD = 50;
const DRAG_LOCK_ANGLE = 30;

function touchDist(t1, t2) {
  const dx = t1.clientX - t2.clientX;
  const dy = t1.clientY - t2.clientY;
  return Math.sqrt(dx * dx + dy * dy);
}

gallery.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
    isDragging  = false;
    dragX       = 0;
    isPinching  = false;
    panStartX   = e.touches[0].clientX;
    panStartY   = e.touches[0].clientY;
    panStartPX  = panX;
    panStartPY  = panY;

  } else if (e.touches.length === 2) {
    isPinching      = true;
    isDragging      = false;
    pinchStartDist  = touchDist(e.touches[0], e.touches[1]);
    pinchStartScale = scale;
    panStartPX      = panX;
    panStartPY      = panY;
  }
}, { passive: true });

gallery.addEventListener('touchmove', e => {

  if (e.touches.length === 2) {
    // ── Pinch zoom ──────────────────────────────────────────────────────────
    e.preventDefault();
    isPinching = true;
    isDragging = false;

    const d = touchDist(e.touches[0], e.touches[1]);
    scale = Math.min(MAX_SCALE, Math.max(MIN_SCALE, pinchStartScale * (d / pinchStartDist)));
    clampPan(scale);

    const img = slides[current].querySelector('img');
    if (img) applyImageTransform(img);

    if (isZoomed()) {
      counter.classList.add('hidden');
      dotsEl.classList.add('hidden');
    }
    return;
  }

  if (e.touches.length === 1) {
    const dx = e.touches[0].clientX - touchStartX;
    const dy = e.touches[0].clientY - touchStartY;

    if (isZoomed()) {
      // ── Pan while zoomed ────────────────────────────────────────────────
      e.preventDefault();
      panX = panStartPX + (e.touches[0].clientX - panStartX);
      panY = panStartPY + (e.touches[0].clientY - panStartY);
      clampPan(scale);
      const img = slides[current].querySelector('img');
      if (img) applyImageTransform(img);
      return;
    }

    // ── Swipe between slides (only when not zoomed) ──────────────────────
    const angle = Math.abs(Math.atan2(dy, dx) * 180 / Math.PI);
    if (!isDragging && Math.abs(dx) < 8) return;

    if (angle < DRAG_LOCK_ANGLE || angle > (180 - DRAG_LOCK_ANGLE)) {
      isDragging = true;
      e.preventDefault();
      dragX = dx;
      gallery.classList.add('dragging');

      slides[current].style.transform = `translateX(${dragX}px)`;

      if (dragX < 0) {
        const next = current + 1 < total ? current + 1 : 0;
        slides[next].style.transform = `translateX(calc(100% + ${dragX}px))`;
        slides[next].classList.add('active');
      } else if (dragX > 0) {
        const prev = current - 1 >= 0 ? current - 1 : total - 1;
        slides[prev].style.transform = `translateX(calc(-100% + ${dragX}px))`;
        slides[prev].classList.add('active');
      }
    }
  }
}, { passive: false });

gallery.addEventListener('touchend', e => {
  gallery.classList.remove('dragging');

  if (isPinching && e.touches.length === 0) {
    isPinching = false;
    if (scale < 1.05) resetZoom();
    return;
  }

  if (isDragging) {
    slides.forEach((s, i) => {
      if (i !== current) {
        s.style.transform = '';
        s.classList.remove('active');
      }
    });
    slides[current].style.transform = '';

    if (dragX < -SWIPE_THRESHOLD) {
      goTo(current + 1 < total ? current + 1 : 0,  1);
    } else if (dragX > SWIPE_THRESHOLD) {
      goTo(current - 1 >= 0 ? current - 1 : total - 1, -1);
    }
  }

  isDragging = false;
  dragX = 0;
});

// ── Double-tap to zoom / reset ─────────────────────────────────────────────
let lastTap = 0;
gallery.addEventListener('touchend', e => {
  if (e.changedTouches.length !== 1) return;
  const now = Date.now();
  if (now - lastTap < 300) {
    if (isZoomed()) {
      resetZoom();
    } else {
      scale = 2.5;
      panX  = 0;
      panY  = 0;
      const img = slides[current].querySelector('img');
      if (img) applyImageTransform(img);
      counter.classList.add('hidden');
      dotsEl.classList.add('hidden');
    }
    lastTap = 0;
  } else {
    lastTap = now;
  }
});

// ── Keyboard navigation (desktop) ─────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') goTo(current + 1 < total ? current + 1 : 0,  1);
  if (e.key === 'ArrowLeft')  goTo(current - 1 >= 0 ? current - 1 : total - 1, -1);
  if (e.key === 'Escape')     resetZoom();
});

updateUI();
</script>
</body>
</html>
