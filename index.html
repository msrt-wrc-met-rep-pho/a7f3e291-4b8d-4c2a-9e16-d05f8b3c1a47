<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<!--
  CACHE CONTROL — change 1 of 3
  These three meta tags tell the browser never to cache this page.
  "no-store" is the strongest — the browser won't save any part of the
  response. "no-cache" and "must-revalidate" add belt-and-braces for
  older browsers. Note: these tags only control caching of the HTML page
  itself. Image caching is handled separately in the JS below.
-->
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<!--
  VIEWPORT — user-scalable=yes is required for pinch-zoom touch events
  to reach our JavaScript. With user-scalable=no, Safari in particular
  swallows pinch gestures before the page ever sees them.
-->
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">

<title>Rally Gallery</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    height: 100dvh;
    overflow: hidden;
    touch-action: pan-x pan-y; /* allows pinch events through while blocking scroll */
    user-select: none;
  }

  #gallery {
    width: 100%;
    height: 100dvh;
    position: relative;
    overflow: hidden;
  }

  .slide {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.25s ease, transform 0.25s ease;
    transform: translateX(100%);
    pointer-events: none;
  }

  .slide.active {
    opacity: 1;
    transform: translateX(0);
    pointer-events: none;
  }

  .slide.prev {
    opacity: 0;
    transform: translateX(-100%);
  }

  .slide img {
    max-width: 100%;
    max-height: 100dvh;
    object-fit: contain;
    display: block;
    pointer-events: none;
    -webkit-user-drag: none;
    transform-origin: center center;
  }

  /* ── Tap zones ──────────────────────────────────────────────────────────── */
  .tap-zone {
    position: fixed;
    top: 0;
    height: 100dvh;
    width: 25%;
    z-index: 20;
    cursor: pointer;
    /* Uncomment to visualise zones during development: */
    /* background: rgba(255,0,0,0.15);                  */
  }

  #tap-prev { left: 0; }
  #tap-next { right: 0; }

  /*
    FLASH REMOVED — change 2 of 3
    The previous version had a .tap-zone:active rule that showed a white
    flash when tapped. That rule has simply been deleted — there is no
    :active style here at all, so tapping produces no visible feedback.
    We also add -webkit-tap-highlight-color: transparent on the zones to
    suppress the blue/grey highlight that iOS/Android apply by default
    to any tapped element.
  */
  .tap-zone {
    -webkit-tap-highlight-color: transparent;
  }

  /* ── Counter pill ───────────────────────────────────────────────────────── */
  #counter {
    position: fixed;
    top: 16px;
    right: 16px;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    color: #fff;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.04em;
    padding: 5px 11px;
    border-radius: 20px;
    pointer-events: none;
    z-index: 10;
    border: 1px solid rgba(255,255,255,0.15);
    transition: opacity 0.3s;
  }

  #counter.hidden { opacity: 0; }

  /* ── Dot strip ──────────────────────────────────────────────────────────── */
  #dots {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 5px;
    align-items: center;
    z-index: 10;
    max-width: 90vw;
    flex-wrap: nowrap;
    overflow: hidden;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  #dots.hidden { opacity: 0; }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(255,255,255,0.35);
    flex-shrink: 0;
    transition: background 0.2s, transform 0.2s;
  }

  .dot.active {
    background: #fff;
    transform: scale(1.35);
  }

  /* ── Spinner ────────────────────────────────────────────────────────────── */
  .slide .loader {
    width: 32px;
    height: 32px;
    border: 3px solid rgba(255,255,255,0.15);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    position: absolute;
    pointer-events: none;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="tap-prev" class="tap-zone"></div>
<div id="tap-next" class="tap-zone"></div>
<div id="counter">1 / N</div>
<div id="dots"></div>
<div id="gallery"></div>

<script>
// ── Image list injected by Python ──────────────────────────────────────────
const IMAGES = [
    "SS20_1.jpg",
    "SS20_2.jpg",
    "SS20_3.jpg",
    "SS20_4.jpg",
    "SS20_5.jpg",
    "SS20_6.jpg",
    "SS20_7.jpg",
    "SS20_8.jpg",
    "SS20_9.jpg",
    "SS20_10.jpg",
    "SS20_11.jpg",
    "SS20_12.jpg",
    "SS20_13.jpg",
    "SS20_14.jpg",
    "SS20_15.jpg",
    "SS20_16.jpg",
    "SS20_17.jpg",
    "SS20_18.jpg",
    "SS20_19.jpg",
    "SS20_20.jpg",
    "SS20_21.jpg",
    "SS20_22.jpg",
    "SS20_23.jpg",
    "SS20_24.jpg",
    "SS20_25.jpg",
    "SS20_26.jpg",
    "SS20_27.jpg",
    "SS20_28.jpg",
    "SS20_29.jpg",
    "SS20_30.jpg",
    "SS20_31.jpg",
    "SS20_32.jpg",
    "SS20_33.jpg",
    "SS20_34.jpg"
];
// ──────────────────────────────────────────────────────────────────────────

const gallery = document.getElementById('gallery');
const counter = document.getElementById('counter');
const dotsEl  = document.getElementById('dots');

let current = 0;
const total = IMAGES.length;

// ── Preload window ─────────────────────────────────────────────────────────
const PRELOAD_AHEAD  = 3;
const PRELOAD_BEHIND = 1;

// ── Build slides ───────────────────────────────────────────────────────────
// img.src is NOT set yet — preloadAround() sets it on demand.
const slides = IMAGES.map((src, i) => {
  const div = document.createElement('div');
  div.className = 'slide' + (i === 0 ? ' active' : '');

  const loader = document.createElement('div');
  loader.className = 'loader';
  div.appendChild(loader);

  const img = document.createElement('img');
  img.dataset.src = src;
  img.onload  = () => { if (loader.parentNode) loader.remove(); };
  img.onerror = () => { if (loader.parentNode) loader.remove(); };
  div.appendChild(img);

  gallery.appendChild(div);
  return div;
});

// ── Preloader ──────────────────────────────────────────────────────────────
/*
  NO-CACHE FOR IMAGES — change 3 of 3
  Browsers cache images aggressively. To force a fresh network fetch every
  time (useful during field testing with varying signal), we append a
  timestamp query string to each image URL: e.g. "SS18_501.jpg?t=1712345678901"
  The server ignores the query string and returns the same image, but the
  browser sees a different URL each time the page loads and fetches it fresh.
  We generate the timestamp once at page-load time (cacheBust) so all images
  share the same bust value within a single session — only a page reload
  triggers new fetches.
*/
const cacheBust = Date.now();

function preloadAround(index) {
  const toLoad = new Set();
  for (let d = -PRELOAD_BEHIND; d <= PRELOAD_AHEAD; d++) {
    toLoad.add(((index + d) % total + total) % total);
  }
  toLoad.forEach(i => {
    const img = slides[i].querySelector('img');
    if (img && !img.src && img.dataset.src) {
      img.src = `${img.dataset.src}?t=${cacheBust}`;
    }
  });
}

// ── Dot strip (only if ≤ 20 images) ───────────────────────────────────────
if (total <= 20) {
  IMAGES.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i === 0 ? ' active' : '');
    dotsEl.appendChild(d);
  });
}

function updateUI() {
  counter.textContent = `${current + 1} / ${total}`;
  dotsEl.querySelectorAll('.dot').forEach((d, i) =>
    d.classList.toggle('active', i === current)
  );
}

// ── Navigation ─────────────────────────────────────────────────────────────
function goTo(index, direction) {
  if (index === current) return;

  resetZoom();

  const outgoing = slides[current];
  const incoming = slides[index];

  incoming.style.transform = direction > 0 ? 'translateX(100%)' : 'translateX(-100%)';
  incoming.classList.remove('prev');
  incoming.offsetHeight; // force reflow

  outgoing.classList.remove('active');
  outgoing.classList.add('prev');
  incoming.classList.add('active');
  incoming.style.transform = '';

  setTimeout(() => {
    outgoing.classList.remove('prev');
    outgoing.style.transform = '';
    const img = outgoing.querySelector('img');
    if (img) img.style.transform = '';
  }, 280);

  current = index;
  updateUI();
  preloadAround(current);
}

function goNext() { goTo(current + 1 < total ? current + 1 : 0,  1); }
function goPrev() { goTo(current - 1 >= 0 ? current - 1 : total - 1, -1); }

// ── Tap zone handlers ──────────────────────────────────────────────────────
document.getElementById('tap-prev').addEventListener('click', goPrev);
document.getElementById('tap-next').addEventListener('click', goNext);

// ── Keyboard navigation (desktop) ─────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') goNext();
  if (e.key === 'ArrowLeft')  goPrev();
  if (e.key === 'Escape')     resetZoom();
});

// ── Pinch / zoom ───────────────────────────────────────────────────────────
const MIN_SCALE = 1.0;
const MAX_SCALE = 4.0;
let scale = 1.0;
let panX  = 0;
let panY  = 0;

function isZoomed() { return scale > 1.02; }

function applyImageTransform(img) {
  img.style.transform = `scale(${scale}) translate(${panX / scale}px, ${panY / scale}px)`;
}

function resetZoom() {
  scale = 1.0; panX = 0; panY = 0;
  const img = slides[current].querySelector('img');
  if (img) applyImageTransform(img);
  counter.classList.remove('hidden');
  dotsEl.classList.remove('hidden');
}

function clampPan(s) {
  const img = slides[current].querySelector('img');
  if (!img) return;
  const vw = window.innerWidth, vh = window.innerHeight;
  const iw = img.naturalWidth || vw, ih = img.naturalHeight || vh;
  const ratio = Math.min(vw / iw, vh / ih);
  const maxPanX = Math.max(0, (iw * ratio * s - vw) / 2);
  const maxPanY = Math.max(0, (ih * ratio * s - vh) / 2);
  panX = Math.max(-maxPanX, Math.min(maxPanX, panX));
  panY = Math.max(-maxPanY, Math.min(maxPanY, panY));
}

let touchStartX = 0, touchStartY = 0;
let isDragging = false, isPinching = false;
let pinchStartDist = 0, pinchStartScale = 1;
let panStartX = 0, panStartY = 0, panStartPX = 0, panStartPY = 0;

function touchDist(t1, t2) {
  return Math.sqrt((t1.clientX - t2.clientX) ** 2 + (t1.clientY - t2.clientY) ** 2);
}

gallery.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
    isDragging = false; isPinching = false;
    panStartX = e.touches[0].clientX;
    panStartY = e.touches[0].clientY;
    panStartPX = panX; panStartPY = panY;
  } else if (e.touches.length === 2) {
    isPinching = true; isDragging = false;
    pinchStartDist  = touchDist(e.touches[0], e.touches[1]);
    pinchStartScale = scale;
    panStartPX = panX; panStartPY = panY;
  }
}, { passive: true });

gallery.addEventListener('touchmove', e => {
  if (e.touches.length === 2) {
    e.preventDefault();
    isPinching = true; isDragging = false;
    scale = Math.min(MAX_SCALE, Math.max(MIN_SCALE,
      pinchStartScale * (touchDist(e.touches[0], e.touches[1]) / pinchStartDist)));
    clampPan(scale);
    const img = slides[current].querySelector('img');
    if (img) applyImageTransform(img);
    if (isZoomed()) {
      counter.classList.add('hidden');
      dotsEl.classList.add('hidden');
    }
    return;
  }
  if (e.touches.length === 1 && isZoomed()) {
    e.preventDefault();
    panX = panStartPX + (e.touches[0].clientX - panStartX);
    panY = panStartPY + (e.touches[0].clientY - panStartY);
    clampPan(scale);
    const img = slides[current].querySelector('img');
    if (img) applyImageTransform(img);
  }
}, { passive: false });

gallery.addEventListener('touchend', e => {
  if (isPinching && e.touches.length === 0) {
    isPinching = false;
    if (scale < 1.05) resetZoom();
  }
  isDragging = false;
});

// Double-tap to zoom / reset
let lastTap = 0;
gallery.addEventListener('touchend', e => {
  if (e.changedTouches.length !== 1) return;
  const now = Date.now();
  if (now - lastTap < 300) {
    if (isZoomed()) {
      resetZoom();
    } else {
      scale = 2.5; panX = 0; panY = 0;
      const img = slides[current].querySelector('img');
      if (img) applyImageTransform(img);
      counter.classList.add('hidden');
      dotsEl.classList.add('hidden');
    }
    lastTap = 0;
  } else {
    lastTap = now;
  }
});

// ── Initialise ─────────────────────────────────────────────────────────────
preloadAround(0);
updateUI();
</script>
</body>
</html>
