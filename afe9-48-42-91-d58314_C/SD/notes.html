<!DOCTYPE html>
<!-- last updated: 26/04/2026 -->
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="manifest" href="../manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SD - 5.5km — Notes</title>
<style>

* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg:        #111;
  --card-bg:   #1a1a1a;
  --accent:    #e8c840;
  --subtext:   #888;
  --border:    #2a2a2a;
  --radius:    10px;
  --toolbar-h: 36px;
  --brand-h:   38px;
}

html, body {
  height: 100dvh;
  background: var(--bg);
  color: #fff;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ── Branding strip ──────────────────────────────────────────────────────── */
#brand-strip {
  height: var(--brand-h);
  min-height: var(--brand-h);
  background: #000;
  border-bottom: 1px solid #1a1a1a;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 12px;
  flex-shrink: 0;
}
#brand-strip img { height: 26px; width: auto; display: block; opacity: 0.9; }

/* ── Toolbar ─────────────────────────────────────────────────────────────── */
#toolbar {
  height: var(--toolbar-h);
  min-height: var(--toolbar-h);
  display: flex;
  align-items: center;
  padding: 0 6px 0 2px;
  background: #000;
  border-bottom: 1px solid #222;
  gap: 6px;
  flex-shrink: 0;
  position: relative;
}

#btn-launch {
  width: 28px; height: 28px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%;
  border: none; background: transparent;
  color: #fff; cursor: pointer; flex-shrink: 0;
}
#btn-launch:active { background: rgba(255,255,255,0.12); }
#btn-launch svg {
  width: 22px; height: 22px;
  fill: none; stroke: currentColor;
  stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round;
}

#toolbar-title {
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 0.06em;
  color: var(--accent);
  flex: 1;
}

#toolbar-count {
  font-size: 12px;
  color: var(--subtext);
  padding-right: 4px;
}

#toolbar-icon {
  width: 24px; height: 24px;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
}

/* ── Countdown bar ───────────────────────────────────────────────────────── */
#countdown-bar-wrap {
  position: absolute;
  top: 0; left: 50%;
  transform: translateX(-50%);
  width: 120px; height: 3px;
  background: rgba(255,255,255,0.1);
  border-radius: 0 0 2px 2px;
  overflow: hidden; pointer-events: none;
}
#countdown-bar {
  height: 100%; width: 100%;
  background: var(--accent);
  border-radius: 0 0 2px 2px;
  transform-origin: left center;
  animation: countdown 60s linear forwards;
}
@keyframes countdown {
  from { transform: scaleX(1); }
  to   { transform: scaleX(0); }
}

/* ── Scroll ──────────────────────────────────────────────────────────────── */
#scroll {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 12px;
  min-height: 0;
}

/* ── Notes grid ──────────────────────────────────────────────────────────── */
#cards {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}

/* ── Note cards ──────────────────────────────────────────────────────────── */
.note-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  cursor: pointer;
  height: 160px;
  display: flex;
  flex-direction: column;
  -webkit-tap-highlight-color: transparent;
}
.note-card:active { opacity: 0.85; }

/* Type label strip — always at top */
.note-type-label {
  font-size: 9px;
  font-weight: 800;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--accent);
  padding: 5px 8px 3px;
  flex-shrink: 0;
  background: var(--card-bg);
}

/* Video / image thumbnail */
.note-thumb {
  width: 100%;
  flex: 1;
  min-height: 0;
  object-fit: contain;
  display: block;
  background: #000;
}

/* Card text area */
.note-text-area {
  padding: 4px 8px 6px;
  flex-shrink: 0;
  height: 52px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

.note-body {
  font-size: 11px;
  line-height: 1.4;
  color: #ddd;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  flex: 1;
  white-space: pre-wrap;
}

/* Text-only card — no thumbnail, label + body fills full card */
.note-card.text-only .note-text-area {
  height: auto;
  flex: 1;
  padding: 4px 8px 8px;
}
.note-card.text-only .note-body {
  -webkit-line-clamp: 6;
  font-size: 12px;
}

/* ── Text expand modal ───────────────────────────────────────────────────── */
#text-modal {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 100;
  background: rgba(0,0,0,0.85);
  align-items: center;
  justify-content: center;
  padding: 24px;
}
#text-modal.visible { display: flex; }
#text-modal-box {
  background: #1a1a1a;
  border: 1px solid #333;
  border-radius: 14px;
  padding: 20px;
  max-width: 480px;
  width: 100%;
  max-height: 70vh;
  overflow-y: auto;
  color: #ddd;
  font-size: 14px;
  line-height: 1.6;
  white-space: pre-wrap;
}

/* ── Image overlay ───────────────────────────────────────────────────────── */
#img-overlay {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 100;
  background: rgba(0,0,0,0.92);
  align-items: center;
  justify-content: center;
  cursor: pointer;
}
#img-overlay.visible { display: flex; }
#img-overlay img {
  max-width: 96%; max-height: 96%;
  object-fit: contain;
  border-radius: 6px;
}

/* ── Empty state ─────────────────────────────────────────────────────────── */
#empty {
  display: none;
  text-align: center;
  color: var(--subtext);
  font-size: 14px;
  margin-top: 40px;
}

/* ── Toast ───────────────────────────────────────────────────────────────── */
#toast {
  position: fixed;
  bottom: 40px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: rgba(232,200,64,0.95);
  color: #000; font-size: 13px; font-weight: 700;
  padding: 8px 18px; border-radius: 20px;
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s, transform 0.3s;
  white-space: nowrap; z-index: 50;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

</style>
</head>
<body>

<div id="brand-strip">
  <img src="../../msport_logo.png" alt="M-Sport">
  <img src="../../stagehand_logo.png" alt="StageHand">
</div>

<div id="toolbar">
  <div id="countdown-bar-wrap"><div id="countdown-bar"></div></div>
  <button id="btn-launch" aria-label="Back to rally">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <div id="toolbar-title">SD - 5.5km — Notes</div>
  <div id="toolbar-count"></div>
  <div id="toolbar-icon"></div>
</div>

<div id="scroll">
  <div id="cards"></div>
  <div id="empty">No notes uploaded yet.</div>
</div>

<div id="img-overlay">
  <img id="overlay-img" src="" alt="">
</div>

<div id="text-modal">
  <div id="text-modal-box"></div>
</div>

<div id="toast"></div>

<script>

// ── GitHub token ──────────────────────────────────────────────────────────
(function() {
  const hash = window.location.hash;
  const match = hash.match(/[#&]t=([^&]+)/);
  if (match) {
    localStorage.setItem('gh_token', match[1]);
    history.replaceState(null, '', window.location.pathname + window.location.search);
  }
})();
function _ghToken() { return localStorage.getItem('gh_token') || ''; }
function _ghHeaders() {
  const t = _ghToken();
  const h = { 'Accept': 'application/vnd.github.v3+json' };
  if (t) h['Authorization'] = 'token ' + t;
  return h;
}

const GITHUB_USERNAME = "msrt-wrc-met-rep-pho";
const GITHUB_REPO     = "a7f3e291-4b8d-4c2a-9e16-d05f8b3c1a47";
const RALLY_FOLDER    = "afe9-48-42-91-d58314_C";
const STAGE           = "SD";

// ── Mark as seen ──────────────────────────────────────────────────────────
function _markSeen(count) {
  localStorage.setItem(`seen_${RALLY_FOLDER}_${STAGE}_notes`, count);
}

// Notes data injected at upload time
const NOTES_DATA = [
  {
    "type": "video",
    "video_id": "g36kohwrL0E",
    "url": "https://youtu.be/g36kohwrL0E",
    "thumbnail": "https://img.youtube.com/vi/g36kohwrL0E/mqdefault.jpg",
    "text": "SD timelapse at 0730",
    "created_at": "09:56:01"
  },
  {
    "type": "text",
    "text": "SS16 review notes:\n\n- stage is dry at SS Start \n- light drizzle at 6,7 with no effect on road\n- light drizzle at 7,7 with no effect on road so far, continues until 9,0\n- from 9,0 drizzle gets stronger, light rain from 9,4\n- from 9,4 road is damp with light increasing dampness \n- light rain from 10,5\n- few wet spots between 11,8 and 12,5\n- wet from 13,1 to finish",
    "created_at": "10:03:07"
  },
  {
    "type": "image",
    "filename": "msport_logo.png",
    "text": "Test image",
    "created_at": "10:09:28"
  },
  {
    "type": "video",
    "video_id": "g36kohwrL0E",
    "url": "https://www.youtube.com/watch?v=g36kohwrL0E",
    "thumbnail": "https://img.youtube.com/vi/g36kohwrL0E/mqdefault.jpg",
    "text": "testing new card layout for videos",
    "created_at": "10:38:41"
  },
  {
    "type": "video",
    "video_id": "g36kohwrL0E",
    "url": "https://www.youtube.com/watch?v=g36kohwrL0E",
    "thumbnail": "https://img.youtube.com/vi/g36kohwrL0E/mqdefault.jpg",
    "text": "double check",
    "created_at": "10:42:33"
  }
];

// Base URL for repo-hosted images
function _imgUrl(filename) {
  return `https://${GITHUB_USERNAME}.github.io/${GITHUB_REPO}/${RALLY_FOLDER}/${STAGE}/${filename}`;
}

// ── RNC/Notes icon ────────────────────────────────────────────────────────
(function() {
  const wrap = document.getElementById('toolbar-icon');
  const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
  svg.setAttribute("viewBox", "0 0 139 60");
  svg.style.width = "32px";
  svg.style.height = "14px";
  const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
  g.setAttribute("transform", "translate(0,60) scale(0.1,-0.1)");
  g.setAttribute("fill", "#e8c840");
  g.setAttribute("stroke", "none");
  g.innerHTML = `
    <path d="M518 560 c-71 -11 -162 -48 -230 -93 -29 -20 -73 -40 -97 -46 -25 -5 -56 -18 -70 -29 -35 -26 -60 -95 -60 -169 -1 -74 21 -106 67 -101 36 4 33 22 -4 28 -27 5 -29 8 -32 60 -7 114 21 162 105 183 28 8 81 33 117 56 85 56 169 81 287 88 160 9 293 -30 393 -116 53 -46 51 -45 176 -66 128 -22 142 -35 138 -130 l-3 -70 -32 -3 c-46 -5 -45 -32 1 -32 50 0 66 28 66 113 0 65 -2 71 -33 102 -25 25 -45 35 -83 40 -103 14 -154 27 -183 48 -16 12 -50 36 -74 54 -96 70 -297 107 -449 83z"/>
    <path d="M640 517 c0 -24 45 -119 60 -127 10 -6 78 -9 152 -8 l133 2 -135 5c-74 4 -140 9 -147 14 -6 4 -19 29 -29 55 -16 43 -34 75 -34 59z"/>
    <path d="M412 443 c26 -60 32 -63 142 -61 l101 2 -95 3 c-101 4 -123 14 -134 59 -4 13 -11 24 -16 24 -6 0 -5 -11 2 -27z"/>
    <path d="M243 274 c-50 -25 -67 -61 -64 -132 1 -13 16 -39 35 -58 29 -29 41 -34 81 -34 40 0 52 5 81 34 29 29 34 41 34 80 0 88 -92 148 -167 110z m109 -43 c42 -38 44 -89 5 -128 -67 -68 -177 2 -146 94 11 35 48 62 86 63 13 0 37 -13 55 -29z"/>
    <path d="M1055 276 c-61 -27 -88 -100 -60 -160 21 -44 59 -66 116 -66 33 0 47 6 75 34 29 29 34 41 34 80 0 86 -89 146 -165 112z m112 -48 c48 -45 23 -132 -44 -152 -32 -10 -89 20 -103 54 -39 93 73 168 147 98z"/>
    <path d="M437 143 c-21 -20 16 -23 261 -21 169 2 267 7 267 13 0 11 -517 20 -528 8z"/>`;
  svg.appendChild(g);
  wrap.appendChild(svg);
})();

// ── Image overlay ─────────────────────────────────────────────────────────
const overlay    = document.getElementById('img-overlay');
const overlayImg = document.getElementById('overlay-img');
overlay.addEventListener('click', () => overlay.classList.remove('visible'));

function _showOverlay(src) {
  overlayImg.src = src;
  overlay.classList.add('visible');
}

// ── Text modal ────────────────────────────────────────────────────────────
const textModal    = document.getElementById('text-modal');
const textModalBox = document.getElementById('text-modal-box');
textModal.addEventListener('click', () => textModal.classList.remove('visible'));

function _showTextModal(text) {
  textModalBox.textContent = text;
  textModal.classList.add('visible');
}

// ── Build cards ───────────────────────────────────────────────────────────
const cardsEl = document.getElementById('cards');
let knownCount = 0;

function renderAll(data) {
  cardsEl.innerHTML = '';
  if (!data || data.length === 0) {
    document.getElementById('empty').style.display = 'block';
    document.getElementById('toolbar-count').textContent = '';
    knownCount = 0;
    return;
  }
  document.getElementById('empty').style.display = 'none';
  document.getElementById('toolbar-count').textContent =
    `${data.length} note${data.length > 1 ? 's' : ''}`;

  data.forEach(note => {
    const card = document.createElement('div');

    function _typeLabel(text) {
      const el = document.createElement('div');
      el.className = 'note-type-label';
      el.textContent = text;
      return el;
    }
    function _textArea(text, clamp) {
      const area = document.createElement('div');
      area.className = 'note-text-area';
      const body = document.createElement('div');
      body.className = 'note-body';
      if (clamp) body.style.webkitLineClamp = clamp;
      body.textContent = text || '';
      area.appendChild(body);
      return area;
    }

    if (note.type === 'video') {
      card.className = 'note-card';
      card.appendChild(_typeLabel('Video'));
      const thumb = document.createElement('img');
      thumb.className = 'note-thumb';
      thumb.src = note.thumbnail;
      thumb.alt = 'Video thumbnail';
      card.appendChild(thumb);
      card.appendChild(_textArea(note.text));
      card.addEventListener('click', () => window.open(note.url, '_blank'));

    } else if (note.type === 'image') {
      card.className = 'note-card';
      card.appendChild(_typeLabel('Image'));
      const src = _imgUrl(note.filename);
      const img = document.createElement('img');
      img.className = 'note-thumb';
      img.src = src;
      img.alt = note.text || '';
      card.appendChild(img);
      card.appendChild(_textArea(note.text));
      card.addEventListener('click', () => _showOverlay(src));

    } else if (note.type === 'text') {
      card.className = 'note-card text-only';
      card.appendChild(_typeLabel('Note'));
      card.appendChild(_textArea(note.text, 6));
      card.addEventListener('click', () => _showTextModal(note.text));
    }

    cardsEl.appendChild(card);
  });

  knownCount = data.length;
  _markSeen(data.length);
}

renderAll(NOTES_DATA);

// ── Back to launch ────────────────────────────────────────────────────────
document.getElementById('btn-launch').addEventListener('click', () => {
  window.location.href = '../launch.html';
});

// ── Toast ─────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ── Countdown bar ─────────────────────────────────────────────────────────
function resetCountdownBar() {
  const bar = document.getElementById('countdown-bar');
  bar.style.animation = 'none';
  bar.offsetHeight;
  bar.style.animation = '';
}

// ── Live refresh ──────────────────────────────────────────────────────────
const _apiBase = `https://api.github.com/repos/${GITHUB_USERNAME}/${GITHUB_REPO}/contents/${RALLY_FOLDER}/${STAGE}/notes.json`;

async function checkForUpdates() {
  if (document.hidden) { resetCountdownBar(); return; }
  try {
    const r = await fetch(_apiBase, { headers: _ghHeaders() });
    if (!r.ok) { resetCountdownBar(); return; }
    const apiData = await r.json();
    const data = JSON.parse(atob(apiData.content.replace(/\n/g, '')));
    if (data.length > knownCount) {
      const added = data.length - knownCount;
      renderAll(data);
      showToast(`+${added} new note${added > 1 ? 's' : ''}`);
    }
  } catch (e) {}
  resetCountdownBar();
}

resetCountdownBar();
setInterval(checkForUpdates, 60000);
document.addEventListener('visibilitychange', () => {
  if (!document.hidden) checkForUpdates();
});

</script>
</body>
</html>
