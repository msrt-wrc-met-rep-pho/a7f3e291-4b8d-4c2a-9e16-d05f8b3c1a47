<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<!-- iOS fullscreen support -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Rally Finland">
<link rel="apple-touch-icon" href="../icons/icon-192.png">
  
<link rel="manifest" href="./manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Rally Gallery</title>
<style>

* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg:        #111;
  --toolbar-h: 52px;
  --accent:    #e8c840;
  --live:      #e8c840;
  --grey:      #2a2a2a;
  --grey-text: #444;
  --radius:    10px;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: #fff;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  overflow: hidden;
}

/* ── Toolbar ──────────────────────────────────────────────────────────────── */
#toolbar {
  height: var(--toolbar-h);
  display: flex;
  align-items: center;
  padding: 0 18px;
  background: #000;
  border-bottom: 1px solid #222;
  flex-shrink: 0;
}

#rally-name {
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 0.06em;
  color: var(--accent);
}

/* ── Scrollable stage grid ────────────────────────────────────────────────── */
#scroll {
  position: fixed;
  top: var(--toolbar-h);
  bottom: 0;
  left: 0;
  right: 0;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 16px;
}

#stage-grid {
  display: grid;
  gap: 10px;
}

/* Portrait: 3 columns. Landscape: 5 columns.
   Updated by JS on load and orientation change. */

/* ── Stage icon card ──────────────────────────────────────────────────────── */
.stage-card {
  border-radius: var(--radius);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  aspect-ratio: 1 / 1;
  gap: 4px;
  transition: transform 0.12s, box-shadow 0.12s;
  position: relative;
}

/* Live stage — tappable, yellow */
.stage-card.live {
  background: #1a1800;
  border: 1.5px solid var(--live);
  cursor: pointer;
}

.stage-card.live:active {
  transform: scale(0.94);
}

/* No images yet — grey, non-tappable */
.stage-card.empty {
  background: var(--grey);
  border: 1.5px solid #333;
  cursor: default;
  pointer-events: none;
}

.stage-name {
  font-size: 18px;
  font-weight: 800;
  letter-spacing: 0.04em;
}

.stage-card.live  .stage-name { color: var(--accent); }
.stage-card.empty .stage-name { color: var(--grey-text); }

.stage-count {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.05em;
}

.stage-card.live  .stage-count { color: rgba(232,200,64,0.6); }
.stage-card.empty .stage-count { color: #333; }

/* ── Loading / error states ───────────────────────────────────────────────── */
#status {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: #555;
  font-size: 14px;
  text-align: center;
  line-height: 1.6;
}

</style>
</head>
<body>

<div id="toolbar">
  <div id="rally-name">Loading...</div>
</div>

<div id="scroll">
  <div id="stage-grid"></div>
</div>

<div id="status">Loading stages...</div>

<script>

// ── Grid columns based on orientation ─────────────────────────────────────
function updateCols() {
  const cols = window.innerWidth > window.innerHeight ? 5 : 3;
  document.getElementById('stage-grid').style.gridTemplateColumns =
    `repeat(${cols}, 1fr)`;
}
window.addEventListener('resize', updateCols);
window.addEventListener('orientationchange', updateCols);
updateCols();

// ── Load stages.json and build grid ───────────────────────────────────────
const cacheBust = Date.now();

fetch(`stages.json?t=${cacheBust}`)
  .then(r => {
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    return r.json();
  })
  .then(data => {
    document.getElementById('status').style.display = 'none';
    document.getElementById('rally-name').textContent = data.rally;
    document.title = data.rally;

    const grid = document.getElementById('stage-grid');

    // SD first if present, then SS1, SS2 ... in order
    const stageKeys = Object.keys(data.stages).sort((a, b) => {
      if (a === 'SD') return -1;
      if (b === 'SD') return  1;
      return parseInt(a.replace('SS','')) - parseInt(b.replace('SS',''));
    });

    stageKeys.forEach(key => {
      const info  = data.stages[key];
      const live  = info.count > 0;

      const card  = document.createElement('div');
      card.className = `stage-card ${live ? 'live' : 'empty'}`;

      const name  = document.createElement('div');
      name.className = 'stage-name';
      name.textContent = key;
      card.appendChild(name);

      const count = document.createElement('div');
      count.className = 'stage-count';
      count.textContent = live ? `${info.count} images` : 'no images';
      card.appendChild(count);

      if (live) {
        card.addEventListener('click', () => {
          window.location.href = `${key}/index.html`;
        });
      }

      grid.appendChild(card);
    });
  })
  .catch(err => {
    document.getElementById('status').textContent =
      `Could not load stage data.\n${err.message}`;
  });

</script>
</body>
</html>
